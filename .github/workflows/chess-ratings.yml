name: Update Chess Rating Chart
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  update-chess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch and generate chart
        run: python3 scripts/fetch_chess_ratings.py
      - name: Commit chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/chess-ratings.svg
          git diff --staged --quiet || git commit -m "chore: update chess rating chart [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}